<!DOCTYPE html>
<html>
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="styles.css">
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    <script type="module" src="yubine.js"></script>
    <title>Yubine | Scanner</title>
    <link rel="icon" type="image/x-icon" href="assets/faviconYubine.ico">

    <!-- Japanese Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">


</head>
<body>
    <nav class="top_header">
        <h1 class="yubine">ゆびね  Yubine</h1>
        <div class="nav_Sub_Pages">
            <a style="text-decoration: none" href="scanner.html">Scanner</a>
        </div>

        <div class="nav_Sub_Pages">
            <a style="text-decoration: none" href="about.html">About</a>
        </div>

        <div class="icons">
            <a href="https://github.com/Yay-Inc/Yubine-Japanese-Tool">
                <img src="assets/github-white-icon.png" width=auto height="30">
            </a>
            <a href="https://discord.com">
                <img src="assets/discord-white-icon.png" width=auto height="30">
            </a>
            <a href="https://partner.projectboard.world/ysc/project/yubine-a-haptic-japanese-learning-tool">
                <img src="assets/projectboard-logo.png" width=auto height="30">
            </a>
        </div>
    </nav>

    <div class="buttonContainer">
        <button type="button" id="bluetoothOn">Connect to device</button>
    </div>
    <div id="loading" style="display: flex; justify-content: center; align-items: center;">
        <img src="assets/Gray_circles_rotate.gif" style="width: 20%; height: auto">
    </div>
    <div id="videoB" style="position: relative; width: 100%; max-width: 640px; margin: 0 auto; aspect-ratio: 4 / 3;">
        <video id="video" autoplay playsinline style="width: 100%; height: 100%; object-fit: cover; display: block">Camera Feed</video>
    </div>
    <div class="buttonContainer">
        <button type="button" id="readText">Scan Text</button>
        <button type="button" class="circleBut" id="inputText">Input text</button>
        <input type="text" id="textInput" class="input_box"></input>
    </div>
    <div></div>
    <p id="displayText"></p>
    <div id="patDropBox" style="padding-left: 20px;">
        <select name="Choose pitch accent..." id="patDropdown" class="input_box">
            <option value="." selected>Choose pitch accent...</option>

        </select>

    </div>
    <canvas id="pitchPatCanvas" style="width: 100%; height: 80px"></canvas>
    <div></div>
    <div style="position: relative; width: 100%; max-width: 640px; margin: 0 auto; aspect-ratio: 4 / 3;">
        <canvas id="canvasBuffer"></canvas>
    </div>

    <footer>
        <p style="padding: 10px;">2026 Yubine</p>
        <a style="padding: 10px;" href="https://github.com/Yay-Inc">Asher Waldschmidt</a> |
        <a style="padding: 10px;" href="https://github.com/pogpickleman">Ifsan Kabir</a>
    </footer>
<script src="https://unpkg.com/kuromoji@0.1.2/build/kuromoji.js"></script>
</body>
</html>
